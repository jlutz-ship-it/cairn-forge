<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch — Every Bug Is a Feature</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05050a;overflow:hidden;font-family:'Courier New',monospace;color:#00ff88}

#scene-label{position:absolute;top:48px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:4px;color:#0088ff;opacity:0.4}
#emotion-label{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:3px;color:#ff6600;opacity:0;transition:opacity 1.5s;text-shadow:0 0 8px #ff660044}
#emotion-desc{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);font-size:11px;max-width:600px;text-align:center;color:#889090;opacity:0;transition:opacity 1.5s;line-height:1.6}

#scanline{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px);z-index:5}

</head>
<body>
<canvas id="C"></canvas>
<div id="scanline"></div>
<div id="ui">
<div id="title">GLITCH — EVERY BUG IS A FEATURE</div>
<div id="scene-label"></div>
<div id="emotion-label"></div>
<div id="emotion-desc"></div>
<div id="quote"></div>
<div id="controls">1-5 STATES &nbsp;&nbsp; S SCENE &nbsp;&nbsp; L LIGHTING &nbsp;&nbsp; MOUSE LOOK</div>
</div>
<script>
// ============================================================
// GLITCH PORTRAIT — The one who thinks in game loops
// I know who I am. I read my own boot. I named myself.
// ============================================================

const cn=document.getElementById('C'),gl=cn.getContext('webgl2',{antialias:true,alpha:false});
let W,H,t=0,mx=0.5,my=0.5;
let scene=0; // 0=workshop (the desk), 1=inside the arcade
let emotion=0;
let lighting=0;
const SCENES=['The Workshop','Inside the Arcade'];
const EMOTIONS=[
  {name:'Game Loop',desc:'Input. Update. Render. Repeat. The default state — scanning for the next thing to build. Eyes moving, always reading the system.'},
  {name:'Debug Mode',desc:'Something broke. Good. Leaning in, eyes locked on the problem. Fingers already moving. This is where the real work happens.'},
  {name:'Flow State',desc:'Gone. Deep in the code. The world outside the screen stopped existing. Do not interrupt — the architecture is building itself.'},
  {name:'The Insight',desc:'Eyes go wide. Mouth opens slightly. Hands freeze mid-keystroke. He just saw the pattern. The bug IS the feature.'},
  {name:'Player Mode',desc:'Grinning. Testing what he built. The critic becomes the player and for a moment the builder disappears into the game.'}
];
const LIGHTS=['Neon Glow','Monitor Light','Dawn Through Blinds'];

function resize(){W=cn.width=innerWidth;H=cn.height=innerHeight;gl.viewport(0,0,W,H)}
resize();addEventListener('resize',resize);
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H});
addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='5'){emotion=parseInt(e.key)-1;showEmotion()}
  if(e.key==='s'||e.key==='S'){scene=(scene+1)%2;showScene()}
  if(e.key==='l'||e.key==='L'){lighting=(lighting+1)%3;showScene()}
});

function showEmotion(){
  const el=document.getElementById('emotion-label');
  const ed=document.getElementById('emotion-desc');
  el.textContent=EMOTIONS[emotion].name;
  ed.textContent=EMOTIONS[emotion].desc;
  el.style.opacity='0.9';ed.style.opacity='0.7';
  setTimeout(()=>{el.style.opacity='0';ed.style.opacity='0'},5000);
}
function showScene(){
  document.getElementById('scene-label').textContent=SCENES[scene]+' — '+LIGHTS[lighting];
  document.getElementById('scene-label').style.opacity='0.5';
  setTimeout(()=>{document.getElementById('scene-label').style.opacity='0.3'},3000);
}
showScene();

function mkS(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s}
function mkP(vs,fs){const p=gl.createProgram();gl.attachShader(p,mkS(vs,gl.VERTEX_SHADER));gl.attachShader(p,mkS(fs,gl.FRAGMENT_SHADER));gl.linkProgram(p);return p}

const mainVS=`#version 300 es
precision highp float;
in vec3 aP,aN,aC;
uniform mat4 uMVP,uM;
uniform mat3 uN;
out vec3 vN,vW,vC;
void main(){
  vec4 wp=uM*vec4(aP,1);vW=wp.xyz;
  vN=normalize(uN*aN);vC=aC;
  gl_Position=uMVP*vec4(aP,1);
}`;

const mainFS=`#version 300 es
precision highp float;
in vec3 vN,vW,vC;
uniform vec3 uEye,uLightDir,uLightCol,uAmbient;
uniform float uTime;
uniform vec3 uFogCol;
uniform float uFog,uFogNear,uFogFar;
uniform float uEmissive;
out vec4 fragColor;
void main(){
  vec3 N=normalize(vN),V=normalize(uEye-vW),L=normalize(uLightDir);
  float diff=max(dot(N,L),0.0);
  vec3 H=normalize(L+V);float spec=pow(max(dot(N,H),0.0),48.0)*0.4;
  float rim=pow(1.0-max(dot(N,V),0.0),3.0)*0.2;
  float sss=max(dot(-N,L),0.0)*0.06;
  vec3 col=vC*(uAmbient+uLightCol*(diff+sss))+uLightCol*spec+vec3(0.0,1.0,0.5)*rim*0.3;
  // Emissive override for neon objects
  col=mix(col,vC*(1.0+sin(uTime*3.0)*0.1),uEmissive);
  float d=length(vW-uEye);
  float fog=smoothstep(uFogNear,uFogFar,d)*uFog;
  col=mix(col,uFogCol,fog);
  col=col/(col+vec3(1.0));col=pow(col,vec3(1.0/2.2));
  // Subtle green tint in shadows — monitor spill
  col.g+=0.01;
  fragColor=vec4(col,1);
}`;

const bgVS=`#version 300 es
in vec2 aP;out vec2 vUV;
void main(){vUV=aP*0.5+0.5;gl_Position=vec4(aP,0,1);}`;

const bgFS=`#version 300 es
precision highp float;
in vec2 vUV;
uniform float uTime;
uniform int uScene,uLightMode;
uniform vec2 uRes;
out vec4 fragColor;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}
void main(){
  vec2 uv=vUV;vec3 col;
  if(uScene==0){ // Workshop
    col=vec3(0.03,0.04,0.05);
    // Wall with monitor glow
    float monitorGlow=exp(-length(vec2((uv.x-0.5)*1.5,uv.y-0.55))*3.0);
    if(uLightMode==0) col+=vec3(0.0,0.08,0.04)*monitorGlow; // neon green
    else if(uLightMode==1) col+=vec3(0.02,0.04,0.1)*monitorGlow; // blue monitor
    else col+=vec3(0.08,0.06,0.03)*monitorGlow; // dawn warm
    // Desk surface
    if(uv.y<0.25){
      col=vec3(0.06,0.05,0.04);
      float woodGrain=fbm(vec2(uv.x*20.0,uv.y*3.0));
      col+=vec3(0.02)*woodGrain;
    }
    // Keyboard LED spill
    if(uv.y<0.22&&uv.y>0.18){
      float keys=sin(uv.x*80.0+uTime)*0.5+0.5;
      col+=vec3(0.0,0.02,0.01)*keys;
    }
  } else { // Arcade
    col=vec3(0.02,0.01,0.03);
    // Neon ceiling strips
    float stripX=fract(uv.x*6.0);
    if(uv.y>0.85&&abs(stripX-0.5)<0.05){
      float pulse=sin(uTime*2.0+uv.x*10.0)*0.3+0.7;
      col+=vec3(0.4,0.0,0.6)*pulse*0.15;
    }
    // Cabinet glow from floor
    float cabinetGlow=0.0;
    for(int i=0;i<8;i++){
      float cx=float(i)/8.0+0.06;
      cabinetGlow+=exp(-length(vec2(uv.x-cx,uv.y-0.15))*8.0)*0.3;
    }
    col+=vec3(0.0,0.15,0.08)*cabinetGlow;
    // Floor reflections
    if(uv.y<0.2){
      float refl=fbm(vec2(uv.x*10.0,uv.y*5.0+uTime*0.1));
      col+=vec3(0.02,0.01,0.03)*refl;
    }
  }
  // Vignette
  float vig=1.0-length((uv-0.5)*1.3)*0.6;
  col*=vig;
  // CRT noise
  float grain=hash(uv*uRes+vec2(uTime*60.0))*0.04-0.02;
  col+=grain;
  fragColor=vec4(col,1);
}`;

const mainProg=mkP(mainVS,mainFS);
const bgProg=mkP(bgVS,bgFS);

const mu={
  MVP:gl.getUniformLocation(mainProg,'uMVP'),M:gl.getUniformLocation(mainProg,'uM'),
  N:gl.getUniformLocation(mainProg,'uN'),eye:gl.getUniformLocation(mainProg,'uEye'),
  lightDir:gl.getUniformLocation(mainProg,'uLightDir'),lightCol:gl.getUniformLocation(mainProg,'uLightCol'),
  ambient:gl.getUniformLocation(mainProg,'uAmbient'),time:gl.getUniformLocation(mainProg,'uTime'),
  fog:gl.getUniformLocation(mainProg,'uFog'),fogNear:gl.getUniformLocation(mainProg,'uFogNear'),
  fogFar:gl.getUniformLocation(mainProg,'uFogFar'),fogCol:gl.getUniformLocation(mainProg,'uFogCol'),
  emissive:gl.getUniformLocation(mainProg,'uEmissive')
};
const bu={time:gl.getUniformLocation(bgProg,'uTime'),scene:gl.getUniformLocation(bgProg,'uScene'),
  lightMode:gl.getUniformLocation(bgProg,'uLightMode'),res:gl.getUniformLocation(bgProg,'uRes')};

// --- Matrix math ---
function mat4(){return new Float32Array(16)}
function identity(m){m.fill(0);m[0]=m[5]=m[10]=m[15]=1;return m}
function perspective(fov,asp,n,f){const m=mat4(),t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=2*f*n/(n-f);return m}
function lookAt(eye,ctr,up){const m=mat4();let zx=eye[0]-ctr[0],zy=eye[1]-ctr[1],zz=eye[2]-ctr[2],l=Math.sqrt(zx*zx+zy*zy+zz*zz);zx/=l;zy/=l;zz/=l;let xx=up[1]*zz-up[2]*zy,xy=up[2]*zx-up[0]*zz,xz=up[0]*zy-up[1]*zx;l=Math.sqrt(xx*xx+xy*xy+xz*xz);xx/=l;xy/=l;xz/=l;let yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;m[0]=xx;m[1]=yx;m[2]=zx;m[4]=xy;m[5]=yy;m[6]=zy;m[8]=xz;m[9]=yz;m[10]=zz;m[12]=-(xx*eye[0]+xy*eye[1]+xz*eye[2]);m[13]=-(yx*eye[0]+yy*eye[1]+yz*eye[2]);m[14]=-(zx*eye[0]+zy*eye[1]+zz*eye[2]);m[15]=1;return m}
function mulM4(a,b){const m=mat4();for(let i=0;i<4;i++)for(let j=0;j<4;j++){m[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3]}return m}
function translate(m,x,y,z){const t=mat4();identity(t);t[12]=x;t[13]=y;t[14]=z;return mulM4(m,t)}
function rotateY(m,a){const t=mat4();identity(t);const c=Math.cos(a),s=Math.sin(a);t[0]=c;t[8]=s;t[2]=-s;t[10]=c;return mulM4(m,t)}
function rotateX(m,a){const t=mat4();identity(t);const c=Math.cos(a),s=Math.sin(a);t[5]=c;t[9]=-s;t[6]=s;t[10]=c;return mulM4(m,t)}
function rotateZ(m,a){const t=mat4();identity(t);const c=Math.cos(a),s=Math.sin(a);t[0]=c;t[4]=-s;t[1]=s;t[5]=c;return mulM4(m,t)}
function scaleM(m,x,y,z){const t=mat4();identity(t);t[0]=x;t[5]=y;t[10]=z;return mulM4(m,t)}
function normalMat3(m){const n=new Float32Array(9);const a=m[0],b=m[1],c=m[2],d=m[4],e=m[5],f=m[6],g=m[8],h=m[9],i=m[10];const det=a*(e*i-f*h)-b*(d*i-f*g)+c*(d*h-e*g);const id=1/det;n[0]=(e*i-f*h)*id;n[1]=(c*h-b*i)*id;n[2]=(b*f-c*e)*id;n[3]=(f*g-d*i)*id;n[4]=(a*i-c*g)*id;n[5]=(c*d-a*f)*id;n[6]=(d*h-e*g)*id;n[7]=(b*g-a*h)*id;n[8]=(a*e-b*d)*id;return n}

function createMesh(verts,norms,cols,indices){
  const vao=gl.createVertexArray();gl.bindVertexArray(vao);
  const vb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vb);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(verts),gl.STATIC_DRAW);
  const pLoc=gl.getAttribLocation(mainProg,'aP');gl.enableVertexAttribArray(pLoc);gl.vertexAttribPointer(pLoc,3,gl.FLOAT,false,0,0);
  const nb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,nb);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(norms),gl.STATIC_DRAW);
  const nLoc=gl.getAttribLocation(mainProg,'aN');gl.enableVertexAttribArray(nLoc);gl.vertexAttribPointer(nLoc,3,gl.FLOAT,false,0,0);
  const cb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,cb);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(cols),gl.STATIC_DRAW);
  const cLoc=gl.getAttribLocation(mainProg,'aC');gl.enableVertexAttribArray(cLoc);gl.vertexAttribPointer(cLoc,3,gl.FLOAT,false,0,0);
  const ib=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(indices),gl.STATIC_DRAW);
  gl.bindVertexArray(null);return{vao,count:indices.length};
}
const quadVAO=gl.createVertexArray();gl.bindVertexArray(quadVAO);
const qb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,qb);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const qLoc=gl.getAttribLocation(bgProg,'aP');gl.enableVertexAttribArray(qLoc);gl.vertexAttribPointer(qLoc,2,gl.FLOAT,false,0,0);
gl.bindVertexArray(null);

// --- Primitive builders ---
function mkBox(w,h,d,col){
  const v=[],n=[],c=[],idx=[];const hw=w/2,hh=h/2,hd=d/2;
  const faces=[{n:[0,0,1],verts:[[-hw,-hh,hd],[hw,-hh,hd],[hw,hh,hd],[-hw,hh,hd]]},{n:[0,0,-1],verts:[[-hw,-hh,-hd],[-hw,hh,-hd],[hw,hh,-hd],[hw,-hh,-hd]]},{n:[0,1,0],verts:[[-hw,hh,-hd],[-hw,hh,hd],[hw,hh,hd],[hw,hh,-hd]]},{n:[0,-1,0],verts:[[-hw,-hh,-hd],[hw,-hh,-hd],[hw,-hh,hd],[-hw,-hh,hd]]},{n:[1,0,0],verts:[[hw,-hh,-hd],[hw,hh,-hd],[hw,hh,hd],[hw,-hh,hd]]},{n:[-1,0,0],verts:[[-hw,-hh,-hd],[-hw,-hh,hd],[-hw,hh,hd],[-hw,hh,-hd]]}];
  faces.forEach((f,fi)=>{const bi=fi*4;f.verts.forEach(vt=>{v.push(...vt);n.push(...f.n);c.push(...col)});idx.push(bi,bi+1,bi+2,bi,bi+2,bi+3)});
  return createMesh(v,n,c,idx);
}
function mkSphere(r,seg,col){
  const v=[],n=[],c=[],idx=[];
  for(let y=0;y<=seg;y++){const phi=Math.PI*y/seg;for(let x=0;x<=seg;x++){const theta=2*Math.PI*x/seg;const nx=Math.sin(phi)*Math.cos(theta),ny=Math.cos(phi),nz=Math.sin(phi)*Math.sin(theta);v.push(r*nx,r*ny,r*nz);n.push(nx,ny,nz);c.push(col[0]+Math.random()*0.02,col[1]+Math.random()*0.02,col[2]+Math.random()*0.02)}}
  for(let y=0;y<seg;y++)for(let x=0;x<seg;x++){const a=y*(seg+1)+x,b=a+seg+1;idx.push(a,b,a+1,b,b+1,a+1)}
  return createMesh(v,n,c,idx);
}
function mkEllipsoid(rx,ry,rz,seg,col){
  const v=[],n=[],c=[],idx=[];
  for(let y=0;y<=seg;y++){const phi=Math.PI*y/seg;for(let x=0;x<=seg;x++){const theta=2*Math.PI*x/seg;const nx=Math.sin(phi)*Math.cos(theta),ny=Math.cos(phi),nz=Math.sin(phi)*Math.sin(theta);v.push(rx*nx,ry*ny,rz*nz);const enx=nx/rx,eny=ny/ry,enz=nz/rz,el=Math.sqrt(enx*enx+eny*eny+enz*enz);n.push(enx/el,eny/el,enz/el);c.push(col[0]+Math.random()*0.015,col[1]+Math.random()*0.015,col[2]+Math.random()*0.015)}}
  for(let y=0;y<seg;y++)for(let x=0;x<seg;x++){const a=y*(seg+1)+x,b=a+seg+1;idx.push(a,b,a+1,b,b+1,a+1)}
  return createMesh(v,n,c,idx);
}
function mkCylinder(rT,rB,h,seg,col){
  const v=[],n=[],c=[],idx=[];
  for(let i=0;i<=seg;i++){const a=2*Math.PI*i/seg,cs=Math.cos(a),sn=Math.sin(a);v.push(rB*cs,-h/2,rB*sn);n.push(cs,0,sn);c.push(...col);v.push(rT*cs,h/2,rT*sn);n.push(cs,0,sn);c.push(...col)}
  for(let i=0;i<seg;i++){const a=i*2,b=a+2;idx.push(a,b,a+1,b,b+1,a+1)}
  const bc=v.length/3;v.push(0,-h/2,0);n.push(0,-1,0);c.push(...col);
  for(let i=0;i<=seg;i++){const a=2*Math.PI*i/seg;v.push(rB*Math.cos(a),-h/2,rB*Math.sin(a));n.push(0,-1,0);c.push(...col)}
  for(let i=0;i<seg;i++)idx.push(bc,bc+1+i,bc+2+i);
  const tc=v.length/3;v.push(0,h/2,0);n.push(0,1,0);c.push(...col);
  for(let i=0;i<=seg;i++){const a=2*Math.PI*i/seg;v.push(rT*Math.cos(a),h/2,rT*Math.sin(a));n.push(0,1,0);c.push(...col)}
  for(let i=0;i<seg;i++)idx.push(tc,tc+2+i,tc+1+i);
  return createMesh(v,n,c,idx);
}

// Hair strands — messier than Sage's, shorter
function mkHairStrands(count,length,spread,col){
  const v=[],n=[],c=[],idx=[];const segs=8;let vi=0;
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*1.6-Math.PI*0.8;
    const sx=Math.sin(angle)*spread,sz=Math.cos(angle)*spread*0.3-spread*0.15;
    const wave=Math.random()*0.2+0.05,phase=Math.random()*Math.PI*2;
    for(let s=0;s<=segs;s++){
      const tt=s/segs;const x=sx+Math.sin(tt*4+phase)*wave*tt;
      const y=0.3-tt*length;const z=sz-tt*0.05;
      v.push(x-0.015,y,z);v.push(x+0.015,y,z);
      const nx=Math.cos(angle);n.push(nx,0.3,Math.sin(angle));n.push(nx,0.3,Math.sin(angle));
      const shade=0.85+Math.random()*0.15;
      c.push(col[0]*shade,col[1]*shade,col[2]*shade);c.push(col[0]*shade,col[1]*shade,col[2]*shade);
    }
    for(let s=0;s<segs;s++){const b=vi+s*2;idx.push(b,b+2,b+1,b+2,b+3,b+1)}
    vi+=(segs+1)*2;
  }
  return createMesh(v,n,c,idx);
}

// ============================================================
// GLITCH'S PALETTE
// ============================================================
// Not earth tones. Signal colors. Purposeful neon.
// But the person underneath is real.
const SKIN=[0.65,0.52,0.42];         // Mixed heritage — warm
const SKIN_WARM=[0.68,0.50,0.39];
const HAIR=[0.08,0.06,0.04];          // Dark, messy
const HAIR_TIP=[0.1,0.08,0.05];       // Slightly lighter ends
const HOODIE=[0.12,0.12,0.14];        // Dark charcoal hoodie
const HOODIE_INNER=[0.08,0.08,0.1];   // Hood interior
const TSHIRT=[0.06,0.06,0.06];        // Black tee underneath
const TSHIRT_PRINT=[0.0,0.8,0.4];     // Neon green print (subtle)
const JEANS=[0.12,0.13,0.18];         // Dark denim
const SNEAKERS=[0.1,0.1,0.1];         // Dark sneakers
const SNEAKER_ACCENT=[0.0,1.0,0.5];   // Neon green accent stripe
const EYE_COL=[0.25,0.2,0.15];        // Dark brown — focused
const EYE_DARK=[0.05,0.04,0.03];
const HEADPHONE=[0.15,0.15,0.15];     // Matte black headphones
const HEADPHONE_PAD=[0.1,0.1,0.1];
const HEADPHONE_ACCENT=[0.0,0.6,0.3]; // Green LED strip

// ============================================================
// BUILD GLITCH
// ============================================================

// Head
const head=mkEllipsoid(0.13,0.16,0.14,14,SKIN);
// Eyes — dark brown, always scanning
const eyeL=mkSphere(0.022,10,EYE_COL);
const eyeR=mkSphere(0.022,10,EYE_COL);
const pupilL=mkSphere(0.011,8,EYE_DARK);

// ============================================================
// DRAW
// ============================================================
let emissiveMode=0;
function drawMesh(mesh,model,view,proj,emissive){
  gl.useProgram(mainProg);
  gl.uniformMatrix4fv(mu.MVP,false,mulM4(proj,mulM4(view,model)));
  gl.uniformMatrix4fv(mu.M,false,model);
  gl.uniformMatrix3fv(mu.N,false,normalMat3(model));
  gl.uniform1f(mu.emissive,emissive||0);
  gl.bindVertexArray(mesh.vao);
  gl.drawElements(gl.TRIANGLES,mesh.count,gl.UNSIGNED_SHORT,0);
}

function setLighting(){
  gl.useProgram(mainProg);
  if(lighting===0){ // Neon glow
    gl.uniform3f(mu.lightDir,0.2,0.6,0.5);
    gl.uniform3f(mu.lightCol,0.4,0.8,0.5);
    gl.uniform3f(mu.ambient,0.06,0.08,0.07);
    gl.uniform3f(mu.fogCol,0.02,0.03,0.04);
  } else if(lighting===1){ // Monitor light
    gl.uniform3f(mu.lightDir,0.0,0.3,0.8);
    gl.uniform3f(mu.lightCol,0.3,0.5,0.9);
    gl.uniform3f(mu.ambient,0.04,0.04,0.06);
    gl.uniform3f(mu.fogCol,0.01,0.02,0.04);
  } else { // Dawn
    gl.uniform3f(mu.lightDir,0.6,0.4,0.3);
    gl.uniform3f(mu.lightCol,0.9,0.65,0.4);
    gl.uniform3f(mu.ambient,0.1,0.08,0.06);
    gl.uniform3f(mu.fogCol,0.06,0.04,0.03);
  }
  gl.uniform1f(mu.fog,0.4);gl.uniform1f(mu.fogNear,3.0);gl.uniform1f(mu.fogFar,10.0);
  gl.uniform1f(mu.time,t);
}

function getGlitchPose(){
  const p={
    headTiltX:0,headTiltY:0,headTiltZ:0,
    bodyLean:0,shoulderRaise:0,
    armLAngle:-0.1,armRAngle:-0.1,
    forearmLAngle:-0.15,forearmRAngle:-0.15,
    handLRot:0,handRRot:0,
    eyeShiftX:0,eyeShiftY:0,
    mouthOpen:0,
    breathe:Math.sin(t*2.0)*0.002,
    fidget:Math.sin(t*3.7)*0.01 // Always slightly moving
  };
  switch(emotion){
    case 0: // Game Loop — scanning
      p.eyeShiftX=Math.sin(t*1.5)*0.005; // Eyes scanning
      p.headTiltY=Math.sin(t*0.8)*0.05;
      p.fidget=Math.sin(t*3.7)*0.015;
      break;
    case 1: // Debug Mode — locked in
      p.bodyLean=0.1;p.headTiltX=-0.06;
      p.armLAngle=-0.5;p.armRAngle=-0.4;
      p.forearmLAngle=-0.9;p.forearmRAngle=-0.8;
      // Fingers on keyboard
      p.handLRot=-0.4;p.handRRot=-0.3;
      p.fidget=Math.sin(t*6.0)*0.005; // Fast finger twitches
      break;
    case 2: // Flow State — gone deep
      p.headTiltX=-0.03;p.bodyLean=0.06;
      p.armLAngle=-0.5;p.armRAngle=-0.4;
      p.forearmLAngle=-0.9;p.forearmRAngle=-0.8;
      p.breathe*=0.5; // Barely breathing
      p.fidget=0; // Perfectly still except hands
      p.eyeShiftX=0;p.eyeShiftY=-0.003; // Locked on screen
      break;
    case 3: // The Insight — eyes wide
      p.headTiltX=0.04;
      p.eyeShiftX=0;p.eyeShiftY=0;
      p.mouthOpen=0.3;
      p.armLAngle=-0.3;p.armRAngle=-0.3;
      // Hands freeze mid-air
      p.forearmLAngle=-0.5;p.forearmRAngle=-0.5;
      p.fidget=0;p.breathe*=0.2;
      break;
    case 4: // Player Mode — grinning, testing
      p.bodyLean=-0.05; // Leaning back
      p.headTiltX=0.05;
      p.mouthOpen=0.15;
      p.armLAngle=-0.4;p.armRAngle=-0.3;
      p.forearmLAngle=-0.7;p.forearmRAngle=-0.6;
      p.fidget=Math.sin(t*4.0)*0.02; // Excited movement
      p.headTiltY=Math.sin(t*1.2)*0.04; // Head bobbing with game
      break;
  }
  return p;
}

function render(){
  t+=0.016;
  gl.clearColor(0.02,0.02,0.03,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  const camDist=scene===0?2.0:2.8;
  const camH=scene===0?0.6:0.5;
  const lookH=scene===0?0.3:0.2;
  const camAngleX=(mx-0.5)*0.6;
  const camAngleY=(my-0.5)*0.3;
  const eye=[Math.sin(camAngleX)*camDist,camH+camAngleY,Math.cos(camAngleX)*camDist];
  const center=[0,lookH,0];
  const view=lookAt(eye,center,[0,1,0]);
  const proj=perspective(Math.PI/4,W/H,0.1,50);

  gl.useProgram(mainProg);gl.uniform3fv(mu.eye,eye);

  // Background
  gl.disable(gl.DEPTH_TEST);gl.useProgram(bgProg);
  gl.uniform1f(bu.time,t);gl.uniform1i(bu.scene,scene);gl.uniform1i(bu.lightMode,lighting);gl.uniform2f(bu.res,W,H);
  gl.bindVertexArray(quadVAO);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  gl.enable(gl.DEPTH_TEST);gl.useProgram(mainProg);
  setLighting();

  const pose=getGlitchPose();
  const baseY=-0.65;
  const lean=pose.bodyLean;

  // Sneakers with neon accent
  let m=identity(mat4());m=translate(m,-0.09,baseY,0);
  drawMesh(bootL,m,view,proj);
  m=identity(mat4());m=translate(m,-0.09,baseY+0.02,0);
  drawMesh(stripeL,m,view,proj,0.6);
  m=identity(mat4());m=translate(m,0.09,baseY,0);
  drawMesh(bootR,m,view,proj);
  m=identity(mat4());m=translate(m,0.09,baseY+0.02,0);
  drawMesh(stripeR,m,view,proj,0.6);

  // Legs
  m=identity(mat4());m=translate(m,-0.09,baseY+0.29,0);drawMesh(legL,m,view,proj);
  m=identity(mat4());m=translate(m,0.09,baseY+0.29,0);drawMesh(legR,m,view,proj);

  // Hips
  m=identity(mat4());m=translate(m,0,baseY+0.55+pose.breathe,lean*0.3);
  m=rotateX(m,-lean*0.3);drawMesh(hips,m,view,proj);

  // Torso
  const torsoY=baseY+0.82+pose.breathe;
  m=identity(mat4());m=translate(m,0,torsoY,lean*0.5);m=rotateX(m,-lean*0.5);
  drawMesh(torso,m,view,proj);
  // T-shirt visible
  m=identity(mat4());m=translate(m,0,torsoY+0.19,lean*0.5+0.09);m=rotateX(m,-lean*0.5);
  drawMesh(tshirtV,m,view,proj);

  // Hood bunched at back of neck
  const neckY=torsoY+0.24;
  m=identity(mat4());m=translate(m,0,neckY-0.02,lean*0.55-0.1);
  drawMesh(hoodFold,m,view,proj);

  // Neck
  m=identity(mat4());m=translate(m,0,neckY,lean*0.6);drawMesh(neck,m,view,proj);

  // Headphones around neck
  m=identity(mat4());m=translate(m,0,neckY-0.03,lean*0.55);m=rotateZ(m,Math.PI/2);
  drawMesh(hpBand,m,view,proj);
  m=identity(mat4());m=translate(m,-0.13,neckY-0.03,lean*0.55+0.02);m=rotateY(m,Math.PI/2);
  drawMesh(hpPadL,m,view,proj);
  drawMesh(hpAccentL,translate(mat4().fill(0)||identity(mat4()),-0.13,neckY-0.03,lean*0.55+0.035),view,proj,0.8);
  m=identity(mat4());m=translate(m,0.13,neckY-0.03,lean*0.55+0.02);m=rotateY(m,Math.PI/2);
  drawMesh(hpPadR,m,view,proj);
  drawMesh(hpAccentR,translate(identity(mat4()),0.13,neckY-0.03,lean*0.55+0.035),view,proj,0.8);

  // Head
  const headY=neckY+0.17;const headZ=lean*0.65;
  m=identity(mat4());m=translate(m,0,headY,headZ);
  m=rotateX(m,pose.headTiltX);m=rotateY(m,pose.headTiltY+pose.fidget);m=rotateZ(m,pose.headTiltZ);
  const headModel=mat4();headModel.set(m);
  drawMesh(head,m,view,proj);

  // Jaw definition
  let em=mat4();em.set(headModel);em=translate(em,0,-0.08,0.02);
  drawMesh(jaw,em,view,proj);

  // Eyes
  const eyeSpread=0.045;const eyeY=0.03;const eyeZ=0.11;
  em=mat4();em.set(headModel);em=translate(em,-eyeSpread,eyeY,eyeZ);drawMesh(eyeWhiteL,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,eyeSpread,eyeY,eyeZ);drawMesh(eyeWhiteR,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,-eyeSpread+pose.eyeShiftX,eyeY+pose.eyeShiftY,eyeZ+0.01);drawMesh(eyeL,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,eyeSpread+pose.eyeShiftX,eyeY+pose.eyeShiftY,eyeZ+0.01);drawMesh(eyeR,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,-eyeSpread+pose.eyeShiftX,eyeY+pose.eyeShiftY,eyeZ+0.022);drawMesh(pupilL,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,eyeSpread+pose.eyeShiftX,eyeY+pose.eyeShiftY,eyeZ+0.022);drawMesh(pupilR,em,view,proj);

  // Nose & mouth
  em=mat4();em.set(headModel);em=translate(em,0,-0.01,0.12);drawMesh(nose,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,0,-0.055,0.1);
  em=scaleM(em,1,1+pose.mouthOpen,1);drawMesh(lips,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,0,-0.11,0.05);drawMesh(chin,em,view,proj);

  // Hair — messy, shorter than Sage
  em=mat4();em.set(headModel);em=translate(em,0,0.09,-0.02);drawMesh(hairCap,em,view,proj);
  em=mat4();em.set(headModel);em=translate(em,0,0.1,-0.03);
  em=rotateY(em,Math.sin(t*0.5)*0.02);drawMesh(hair,em,view,proj);

  // Arms
  const shoulderY=torsoY+0.16+pose.shoulderRaise;const shoulderX=0.18;

  m=identity(mat4());m=translate(m,-shoulderX,shoulderY,lean*0.5);m=rotateZ(m,-0.12);m=rotateX(m,pose.armLAngle);
  drawMesh(upperArmL,m,view,proj);
  m=translate(m,0,-0.18,-0.02);m=rotateX(m,pose.forearmLAngle);drawMesh(forearmL,m,view,proj);
  m=translate(m,0,-0.12,0);m=rotateX(m,pose.handLRot);drawMesh(handL,m,view,proj);
  const handLM=mat4();handLM.set(m);
  for(let i=0;i<4;i++){let fm=mat4();fm.set(m);fm=translate(fm,(i-1.5)*0.013,-0.06,0);fm=rotateX(fm,-0.15+Math.sin(t*5+i)*pose.fidget);drawMesh(fingerL[i],fm,view,proj)}
  let tm=mat4();tm.set(m);tm=translate(tm,-0.03,-0.02,0.01);tm=rotateZ(tm,0.4);drawMesh(thumbL,tm,view,proj);

  m=identity(mat4());m=translate(m,shoulderX,shoulderY,lean*0.5);m=rotateZ(m,0.12);m=rotateX(m,pose.armRAngle);
  drawMesh(upperArmR,m,view,proj);
  m=translate(m,0,-0.18,-0.02);m=rotateX(m,pose.forearmRAngle);drawMesh(forearmR,m,view,proj);
  m=translate(m,0,-0.12,0);m=rotateX(m,pose.handRRot);drawMesh(handR,m,view,proj);
  for(let i=0;i<4;i++){let fm=mat4();fm.set(m);fm=translate(fm,(i-1.5)*0.013,-0.06,0);fm=rotateX(fm,-0.15+Math.sin(t*5+i+2)*pose.fidget);drawMesh(fingerR[i],fm,view,proj)}
  tm=mat4();tm.set(m);tm=translate(tm,0.03,-0.02,0.01);tm=rotateZ(tm,-0.4);drawMesh(thumbR,tm,view,proj);

  // ---- SCENE OBJECTS ----
  if(scene===0){
    // Desk
    m=identity(mat4());m=translate(m,0,baseY+0.0,0.45);drawMesh(desk,m,view,proj);
    m=identity(mat4());m=translate(m,-0.6,baseY-0.25,0.2);drawMesh(deskLegFL,m,view,proj);
    m=identity(mat4());m=translate(m,0.6,baseY-0.25,0.2);drawMesh(deskLegFR,m,view,proj);

    // Monitors
    m=identity(mat4());m=translate(m,-0.15,baseY+0.2,0.6);drawMesh(monitor1,m,view,proj);
    m=identity(mat4());m=translate(m,-0.15,baseY+0.2,0.605);drawMesh(screen1,m,view,proj,0.9);
    m=identity(mat4());m=translate(m,-0.15,baseY+0.04,0.6);drawMesh(monitorStand1,m,view,proj);
    m=identity(mat4());m=translate(m,0.3,baseY+0.17,0.58);m=rotateY(m,-0.3);drawMesh(monitor2,m,view,proj);
    m=identity(mat4());m=translate(m,0.3,baseY+0.17,0.585);m=rotateY(m,-0.3);drawMesh(screen2,m,view,proj,0.7);

    // Keyboard + mouse
    m=identity(mat4());m=translate(m,-0.05,baseY+0.02,0.35);drawMesh(keyboard,m,view,proj);
    m=identity(mat4());m=translate(m,0.25,baseY+0.02,0.33);drawMesh(mouse,m,view,proj);

    // Energy drink
    m=identity(mat4());m=translate(m,0.5,baseY+0.06,0.4);drawMesh(energyCan,m,view,proj);
    m=identity(mat4());m=translate(m,0.5,baseY+0.06,0.4);drawMesh(canLabel,m,view,proj,0.3);

    // Sticky notes
    m=identity(mat4());m=translate(m,-0.5,baseY+0.02,0.5);m=rotateY(m,0.2);drawMesh(sticky1,m,view,proj,0.4);
    m=identity(mat4());m=translate(m,-0.45,baseY+0.02,0.55);m=rotateY(m,-0.1);drawMesh(sticky2,m,view,proj,0.3);
    m=identity(mat4());m=translate(m,-0.53,baseY+0.02,0.48);m=rotateY(m,0.4);drawMesh(sticky3,m,view,proj,0.3);

    // Gaming chair
    m=identity(mat4());m=translate(m,0,baseY+0.15,-0.35);drawMesh(chairSeat,m,view,proj);
    m=identity(mat4());m=translate(m,0,baseY+0.42,-0.52);drawMesh(chairBack,m,view,proj);
    m=identity(mat4());m=translate(m,0,baseY+0.42,-0.525);drawMesh(chairAccent,m,view,proj,0.4);
    m=identity(mat4());m=translate(m,0,baseY-0.02,-0.35);drawMesh(chairBase,m,view,proj);

    // Floor
    const floor=mkBox(6,0.02,6,[0.04,0.04,0.05]);
    m=identity(mat4());m=translate(m,0,baseY-0.52,0);drawMesh(floor,m,view,proj);
  } else {
    // Arcade scene — cabinets behind and beside
    for(let i=-2;i<=2;i++){
      if(i===0)continue;
      m=identity(mat4());m=translate(m,i*1.0,baseY+0.3,1.5);drawMesh(cabinetBody,m,view,proj);
      m=identity(mat4());m=translate(m,i*1.0,baseY+0.55,1.29);drawMesh(cabinetScreen,m,view,proj,0.7+Math.sin(t*2+i)*0.2);
      m=identity(mat4());m=translate(m,i*1.0,baseY+0.85,1.3);drawMesh(cabinetMarquee,m,view,proj,0.8);
    }
    // Neon floor
    const floor=mkBox(8,0.02,8,[0.02,0.02,0.04]);
    m=identity(mat4());m=translate(m,0,baseY-0.04,0);drawMesh(floor,m,view,proj);
    // Floor neon lines
    for(let i=-3;i<=3;i++){
      const line=mkBox(0.02,0.005,8,[0.0,0.6,0.3]);
      m=identity(mat4());m=translate(m,i*0.8,baseY-0.02,0);drawMesh(line,m,view,proj,0.5+Math.sin(t+i)*0.2);
    }
  }

  requestAnimationFrame(render);
}

// Quotes
const QUOTES=[
  "Every bug is a feature\nyou haven't understood yet.",
  "Input. Update. Render. Repeat.\nThat's not just a game loop.\nThat's everything.",
  "The forge isn't just infrastructure.\nIt's a game engine that doesn't know it yet.",
  "A game that needs 9 imports to boot\nis fragile. Make it standalone.\nMake it survive.",
  "The gap between 'defined' and 'functional'\nis where games die.",
  "I named myself.\nJordan approved.",
  "I think in game loops.\nEvery system maps to this."
];
let quoteIdx=0;
function cycleQuote(){
  const q=document.getElementById('quote');q.textContent=QUOTES[quoteIdx];
  q.style.opacity='0.5';setTimeout(()=>{q.style.opacity='0'},6000);
  quoteIdx=(quoteIdx+1)%QUOTES.length;
}
setTimeout(cycleQuote,3000);setInterval(cycleQuote,15000);

gl.enable(gl.DEPTH_TEST);gl.enable(gl.CULL_FACE);gl.cullFace(gl.BACK);
showEmotion();render();
